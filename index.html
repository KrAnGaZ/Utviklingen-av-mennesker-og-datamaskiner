<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forskning</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* NAVBAR */
.navbar {
    position: fixed;
    top: 0;
    width: 100%;
    background: black;
    padding: 15px;
    text-align: center;
    z-index: 1000;
}

.navbar a {
    color: white;
    margin: 0 15px;
    text-decoration: none;
    font-size: 18px;
    cursor: pointer;
}

.navbar a:hover {
    text-decoration: underline;
}

/* DROPDOWN */
.dropdown {
    display: inline-block;
    position: relative;
}

.dropdown-content {
    position: absolute;
    background: black;
    top: 100%; /* 👈 viktig! starter rett under knappen */
    left: 0;
    min-width: 120px;

    opacity: 0;
    visibility: hidden;
    transform: translateY(-10px);
    transition: 0.3s;

    z-index: 9999; /* 👈 sørger for at den ligger oppå */
}
.dropdown-content a {
    display: block;
    padding: 10px;
}

/* VIS MENY */
.dropdown.active .dropdown-content {
    opacity: 1;
    visibility: visible;
    transform: translateY(0);
}

/* SEKSJONER */
.section {
    display: none;
    padding-top: 80px;
    min-height: 100vh;
    text-align: center;
}

/* AKTIV SIDE */
.active {
    display: block;
}

/* HJEM */
.home {
    background-image: url("bilde.jpg"); /* BYTT TIL DITT BILDE */
    background-size: cover;
    background-position: center;
    color: white;
}
</style>

<script>
function showPage(pageId) {
    let sections = document.querySelectorAll(".section");
    sections.forEach(sec => sec.classList.remove("active"));

    document.getElementById(pageId).classList.add("active");
}

/* ÅPNE/LUKK SPRÅK */
function toggleDropdown() {
    document.querySelector(".dropdown").classList.toggle("active");
}

/* LUKK HVIS KLIKK UTENFOR */
document.addEventListener("click", function(e) {
    let dropdown = document.querySelector(".dropdown");

    if (!dropdown.contains(e.target)) {
        dropdown.classList.remove("active");
    }
});

/* SPRÅK */
function setLanguage(lang) {

    if (lang === "no") {
        // 🔴 HER KODER DU NORSK
        alert("Norsk valgt");

        // EKSEMPEL:
        // document.querySelector("#home h1").innerText = "Velkommen";
    }

    if (lang === "en") {
        // 🔵 HER KODER DU ENGELSK
        alert("English selected");

        // EKSEMPEL:
        // document.querySelector("#home h1").innerText = "Welcome";
    }

    document.querySelector(".dropdown").classList.remove("active");
}
</script>

</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <a onclick="showPage('home')">Hjem</a>
    <a onclick="showPage('creators')">Om skaperne</a>
    <a onclick="showPage('research')">Forskningsside</a>

    <div class="dropdown">
        <a onclick="toggleDropdown()">Språk</a>
        <div class="dropdown-content">
            <a onclick="setLanguage('no')">Norsk</a>
            <a onclick="setLanguage('en')">English</a>
        </div>
    </div>
</div>

<!-- HJEM -->
<div id="home" class="section home active">

    <!-- 👇 SKRIV HER -->
    <h1>Velkommen til forsknings verden</h1>
    <p>Her kan du skrive intro.</p>

</div>

<!-- SKAPERE -->
<div id="creators" class="section">

    <!-- 👇 SKRIV HER -->
    <h1>Skaperne</h1>
    <p>Alexander Von Zernichow Sponheim</p>
    <p>Jonathan Myrberg</p>

</div>

<!-- FORSKNING -->
<div id="research" class="section">

    <!-- 👇 SKRIV HER -->
    <h1>Forskning</h1>
    <p>Her legger du inn graf og forklaring.</p>

</div>

</body>
</html>
