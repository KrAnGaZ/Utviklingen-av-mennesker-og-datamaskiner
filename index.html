<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* NAVBAR */
.navbar {
    position: fixed;
    top: 0;
    width: 100%;
    background: black;
    padding: 15px;
    text-align: center;
    z-index: 1000;
}

.navbar a {
    color: white;
    margin: 0 15px;
    text-decoration: none;
    font-size: 18px;
    cursor: pointer;
}

/* 👇 HOVER STREK (TILBAKE) */
.navbar a:hover {
    text-decoration: underline;
}

/* DROPDOWN */
.dropdown {
    display: inline-block;
    position: relative;
}

.dropdown-content {
    display: none;
    position: absolute;
    background: black;
    top: 100%; /* 👈 gjør at den kommer rett under */
    left: 0;
    min-width: 120px;

    /* 👇 ANIMASJON */
    opacity: 0;
    transform: translateY(-10px);
    transition: 0.3s;
}

.dropdown-content a {
    display: block;
    padding: 10px;
}

/* 👇 NÅR ÅPEN */
.dropdown-content.show {
    display: block;
    opacity: 1;
    transform: translateY(0);
}

/* SEKSJONER */
.section {
    display: none;
    padding-top: 80px;
    min-height: 100vh;
    text-align: center;
}

.active {
    display: block;
}
</style>

<script>
function showPage(pageId) {
    let sections = document.querySelectorAll(".section");
    sections.forEach(sec => sec.classList.remove("active"));

    document.getElementById(pageId).classList.add("active");
}

/* SPRÅK */
function toggleDropdown() {
    let menu = document.getElementById("languageMenu");
    menu.classList.toggle("show");
}

/* LUKK NÅR MAN KLIKKER UTENFOR */
document.addEventListener("click", function(event) {
    let menu = document.getElementById("languageMenu");
    let button = document.getElementById("languageButton");

    if (!button.contains(event.target) && !menu.contains(event.target)) {
        menu.classList.remove("show");
    }
});

    if (lang === "en") {

    }

    document.getElementById("languageMenu").classList.remove("show");
}
</script>
