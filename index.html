<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Forsknings Verden</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* NAVBAR */
.navbar {
    position: fixed;
    top: 0;
    width: 100%;
    background: black;
    padding: 15px;
    text-align: center;
}

.navbar a {
    color: white;
    margin: 0 15px;
    text-decoration: none;
    font-size: 18px;
    cursor: pointer;
}

.navbar a:hover {
    text-decoration: underline;
}

/* DROPDOWN */
.dropdown {
    display: inline-block;
    position: relative;
}

.dropdown-content {
    display: none;
    position: absolute;
    background: black;
    top: 100%;
    left: 0;
    min-width: 120px;

    opacity: 0;
    transform: translateY(-10px);
    transition: 0.3s;
}

.dropdown-content a {
    display: block;
    padding: 10px;
}

.dropdown-content.show {
    display: block;
    opacity: 1;
    transform: translateY(0);
}

/* SEKSJONER */
.section {
    opacity: 0;
    transform: translateY(20px);
    transition: 0.5s;

    position: absolute;
    width: 100%;
    top: 0;
    left: 0;

    padding-top: 80px;
    min-height: 100vh;
    text-align: center;
}

/* AKTIV SIDE */
.active {
    opacity: 1;
    transform: translateY(0);
    position: relative;
}

/* EKSTRA */
.hero {
    height: 100vh;
    background-image: url("bildet.jpg"); /* 👈 BYTT TIL DITT BILDE */
    background-size: cover;
    background-position: center;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <a onclick="showPage('home')">Hjem</a>
    <a onclick="showPage('about')">Om skaperne</a>
    <a onclick="showPage('research')">Forskningsside</a>

    <div class="dropdown">
        <a id="languageButton" onclick="toggleDropdown()">Språk</a>
        <div class="dropdown-content" id="languageMenu">
            <a onclick="setLanguage('no')">Norsk</a>
            <a onclick="setLanguage('en')">English</a>
        </div>
    </div>
</div>

<!-- HJEM -->
<div id="home" class="section active">
    <div class="hero">
        Velkommen til forsknings verden
    </div>

    <h2>Her kan du skrive tekst 👇</h2>
    <p>Dette er stedet du kan legge inn hva du vil.</p>
</div>

<!-- OM SKAPERNE -->
<div id="about" class="section">
    <h1>Skaperne</h1>
    <p>Skriv om deg selv her.</p>
</div>

<!-- FORSKNING -->
<div id="research" class="section">
    <h1>Forskningsside</h1>
    <p>Her er hovedinnholdet ditt.</p>
</div>

<script>
function showPage(pageId) {
    let sections = document.querySelectorAll(".section");
    sections.forEach(sec => sec.classList.remove("active"));

    document.getElementById(pageId).classList.add("active");
}

function toggleDropdown() {
    document.getElementById("languageMenu").classList.toggle("show");
}

document.addEventListener("click", function(event) {
    let menu = document.getElementById("languageMenu");
    let button = document.getElementById("languageButton");

    if (!button.contains(event.target) && !menu.contains(event.target)) {
        menu.classList.remove("show");
    }
});

function setLanguage(lang) {
    if (lang === "no") {
        alert("Norsk valgt");
    }

    if (lang === "en") {
        alert("English selected");
    }

    document.getElementById("languageMenu").classList.remove("show");
}
</script>

</body>
</html>
